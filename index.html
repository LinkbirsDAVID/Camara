<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cámara PRO - Control de Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
  min-height:100vh;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}
.container{max-width:950px;width:100%;text-align:center;}
h1{margin-bottom:10px;}
button{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  border:none;padding:10px 18px;border-radius:10px;color:white;
  cursor:pointer;margin:5px;transition:.25s;
}
button:hover{transform:scale(1.05);} 
.video-wrapper{position:relative;border-radius:15px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);} 
video{width:100%;max-height:420px;object-fit:cover;}
canvas{position:absolute;top:0;left:0;}
.controls{margin-top:10px;}
.status{margin-top:10px;font-size:.85rem;opacity:.7;}
.hidden{display:none;}
</style>
</head>

<body>
<div class="container">
<h1>📸 Cámara Inteligente</h1>
<button id="startBtn">¿Preparado? Toma una foto</button>

<div id="cameraSection" class="hidden">

<div class="video-wrapper">
  <video id="video" autoplay playsinline></video>
  <canvas id="overlay"></canvas>
</div>

<div class="controls">
  <button id="switchCam">🔄 Cambiar cámara</button>
  <button id="capture">📷 Capturar</button>
  <button id="download" class="hidden">⬇️ Descargar</button>
</div>

<div class="status" id="status">Inicializando...</div>

</div>
</div>

<script>
let video = document.getElementById('video');
let overlay = document.getElementById('overlay');
let ctx = overlay.getContext('2d');
let stream;
let facing = 'environment';

const statusText = document.getElementById('status');

// INICIAR CAMARA
async function startCamera(){
  if(stream) stream.getTracks().forEach(t=>t.stop());

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing,width:{ideal:1920},height:{ideal:1080}},
      audio:false
    });

    video.srcObject = stream;
    statusText.innerText = 'Cámara activa ✔';

  }catch(e){
    statusText.innerText = 'Error cámara ❌';
  }
}

// BOTON INICIO
document.getElementById('startBtn').onclick = async ()=>{
  document.getElementById('cameraSection').classList.remove('hidden');
  await startCamera();
  await loadFaceAPI();
  detectFaces();
};

// CAMBIAR CAMARA
document.getElementById('switchCam').onclick = async ()=>{
  facing = (facing === 'environment') ? 'user' : 'environment';
  await startCamera();
};

// CAPTURA ALTA CALIDAD
document.getElementById('capture').onclick = ()=>{
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const c = canvas.getContext('2d');
  c.drawImage(video,0,0);

  const link = document.getElementById('download');
  link.href = canvas.toDataURL('image/png',1.0);
  link.download = `foto_${Date.now()}.png`;
  link.classList.remove('hidden');

  statusText.innerText = 'Foto capturada ✔';
};

// DESCARGA
document.getElementById('download').onclick = function(){
  this.click();
};

// FACE API
async function loadFaceAPI(){
  const url = 'https://cdn.jsdelivr.net/npm/face-api.js/weights';
  await faceapi.nets.tinyFaceDetector.loadFromUri(url);
}

async function detectFaces(){
  overlay.width = video.clientWidth;
  overlay.height = video.clientHeight;

  setInterval(async ()=>{
    const detections = await faceapi.detectAllFaces(video,new faceapi.TinyFaceDetectorOptions());
    ctx.clearRect(0,0,overlay.width,overlay.height);

    detections.forEach(det=>{
      const box = det.box;
      ctx.strokeStyle = '#00ff99';
      ctx.lineWidth = 2;
      ctx.strokeRect(box.x,box.y,box.width,box.height);
    });

  },200);
}

</script>
</body>
</html>
