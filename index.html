<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cámara PRO Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:420px;
  padding:15px;
  text-align:center;
}

h1{font-size:1.4rem;margin-bottom:10px;}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
  font-size:1rem;
  margin-top:10px;
}

.video-box{
  position:relative;
  width:100%;
  border-radius:18px;
  overflow:hidden;
  margin-top:15px;
  border:1px solid rgba(255,255,255,0.1);
}

video{
  width:100%;
  height:auto;
  display:block;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.controls{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.controls button{
  flex:1;
}

.status{
  margin-top:10px;
  font-size:.8rem;
  opacity:.7;
}

.hidden{display:none;}

</style>
</head>

<body>
<div class="container">

<h1>📸 Cámara Inteligente</h1>

<button id="startBtn">¿Preparado? Toma una foto</button>

<div id="camUI" class="hidden">

<div class="video-box">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<div class="controls">
  <button id="switch">🔄</button>
  <button id="capture">📷</button>
</div>

<button id="download" class="hidden">⬇️ Descargar Foto</button>

<div class="status" id="status">Cargando...</div>

</div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusText = document.getElementById('status');

let stream;
let facing = 'environment';

async function startCamera(){
  if(stream) stream.getTracks().forEach(t=>t.stop());

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing,width:{ideal:1280},height:{ideal:720}},
      audio:false
    });

    video.srcObject = stream;
    statusText.innerText = 'Cámara activa ✔';

  }catch(e){
    statusText.innerText = 'Error cámara ❌';
  }
}

// iniciar
document.getElementById('startBtn').onclick = async ()=>{
  document.getElementById('camUI').classList.remove('hidden');
  await startCamera();
  await loadModels();
  detectFaces();
};

// cambiar camara
document.getElementById('switch').onclick = async ()=>{
  facing = facing === 'environment' ? 'user' : 'environment';
  await startCamera();
};

// captura
document.getElementById('capture').onclick = ()=>{
  const temp = document.createElement('canvas');
  temp.width = video.videoWidth;
  temp.height = video.videoHeight;
  const c = temp.getContext('2d');
  c.drawImage(video,0,0);

  const link = document.getElementById('download');
  link.href = temp.toDataURL('image/png',1.0);
  link.download = 'foto.png';
  link.classList.remove('hidden');

  statusText.innerText = 'Foto capturada ✔';
};

// descargar
document.getElementById('download').onclick = function(){
  this.click();
};

// cargar modelos
async function loadModels(){
  const url = 'https://cdn.jsdelivr.net/npm/face-api.js/weights';
  await faceapi.nets.tinyFaceDetector.loadFromUri(url);
  statusText.innerText = 'IA lista 🤖';
}

// deteccion
async function detectFaces(){
  canvas.width = video.clientWidth;
  canvas.height = video.clientHeight;

  setInterval(async ()=>{
    if(video.readyState !== 4) return;

    const detections = await faceapi.detectAllFaces(video,new faceapi.TinyFaceDetectorOptions());

    ctx.clearRect(0,0,canvas.width,canvas.height);

    detections.forEach(det=>{
      const {x,y,width,height} = det.box;

      ctx.strokeStyle = '#00ff99';
      ctx.lineWidth = 2;
      ctx.strokeRect(x,y,width,height);

      ctx.fillStyle = '#00ff99';
      ctx.font = '12px Poppins';
      ctx.fillText('Rostro detectado', x, y - 5);
    });

  },150);
}

</script>
</body>
</html>
